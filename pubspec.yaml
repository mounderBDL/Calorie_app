name: food_lens
description: AI-powered food recognition and nutrition tracker
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # TFLite inference
  tflite_flutter: ^0.12.1

  # Camera & image picking
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  image: ^4.1.7

  # Local database
  sqflite: ^2.3.2
  path: ^1.9.0

  # UI & animations
  google_fonts: ^6.2.1
  animate_do: ^3.3.4
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  fl_chart: ^0.67.0

  # Utilities
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

  # firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/model/model.tflite
    - assets/model/model_labels.txt

